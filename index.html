<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN - تطبيق المقاطع القصيرة</title>
    <style>
        /* ===== التصميم الأساسي ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, sans-serif; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100vw; }
        :root { --accent-color: #ff2b55; }
        
        /* ===== شاشة تسجيل الدخول ===== */
        .auth-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }
        .auth-card {
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px;
            padding: 30px; width: 100%; max-width: 400px; text-align: center;
        }
        .auth-logo { font-size: 3.5rem; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .google-btn {
            background: #fff; color: #000; border: none; padding: 14px;
            border-radius: 12px; width: 100%; font-weight: bold; font-size: 0.95rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 15px;
        }
        .divider { display: flex; align-items: center; color: #444; margin: 15px 0; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #151515; margin: 0 10px; }
        .action-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            cursor: pointer; font-weight: bold; margin-top: 8px; font-size: 0.95rem;
        }
        .action-btn.submit { background: #fff; color: #000; }
        .action-btn.cancel { background: #16161a; color: #fff; }
        .form-control {
            width: 100%; padding: 14px; background: #111; border: 1px solid #222;
            border-radius: 12px; color: white; outline: none; margin-bottom: 12px;
            font-size: 0.95rem;
        }
        
        /* ===== Modal ===== */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 500; display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: #0a0a0a; width: 100%; max-width: 450px; padding: 24px;
            border-radius: 24px 24px 0 0; transform: translateY(100%);
            transition: transform 0.25s;
        }
        .modal.active .modal-card { transform: translateY(0); }
    </style>
</head>
<body>

    <!-- ===== شاشة تسجيل الدخول ===== -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <div class="auth-logo">ZAN</div>
            <p style="color:#666; margin-bottom:25px;">تطبيق المقاطع القصيرة الأسود الملكي</p>

            <!-- زر Google الحقيقي -->
            <button class="google-btn" id="googleAuthBtn">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_of_googleg_24dp.png" width="18" alt="Google">
                تسجيل الدخول عبر Google
            </button>

            <div class="divider">أو</div>

            <button class="action-btn submit" id="showLoginBtn">تسجيل الدخول</button>
            <button class="action-btn submit" id="showSignupBtn">إنشاء حساب جديد</button>
        </div>
    </div>

    <!-- ===== Modal تسجيل الدخول ===== -->
    <div class="modal" id="loginModal">
        <div class="modal-card">
            <h2 style="margin-bottom:15px;">تسجيل الدخول</h2>
            <input type="text" id="loginUsername" class="form-control" placeholder="اسم المستخدم">
            <input type="password" id="loginPassword" class="form-control" placeholder="كلمة المرور">
            <button class="action-btn submit" id="loginBtn">دخول</button>
            <button class="action-btn cancel" onclick="hideModals()">إلغاء</button>
        </div>
    </div>

    <!-- ===== Modal إنشاء حساب ===== -->
    <div class="modal" id="signupModal">
        <div class="modal-card">
            <h2 style="margin-bottom:15px;">إنشاء حساب جديد</h2>
            <input type="text" id="signupFullName" class="form-control" placeholder="الاسم الكامل">
            <input type="text" id="signupUsername" class="form-control" placeholder="اسم المستخدم">
            <input type="email" id="signupEmail" class="form-control" placeholder="البريد الإلكتروني">
            <input type="password" id="signupPassword" class="form-control" placeholder="كلمة المرور">
            <button class="action-btn submit" id="signupBtn">إنشاء الحساب</button>
            <button class="action-btn cancel" onclick="hideModals()">إلغاء</button>
        </div>
    </div>

    <!-- ===== شاشة التطبيق الرئيسية (بعد الدخول) ===== -->
    <div id="appScreen" style="display:none; height:100vh; width:100vw; background:#000; position:fixed; top:0; left:0; z-index:999; flex-direction:column;">
        <div style="padding:20px; text-align:center; border-bottom:1px solid #1a1a1a;">
            <h1>ZAN</h1>
            <p id="welcomeMsg">مرحباً بك!</p>
        </div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:#555;">
            <div style="text-align:center;">
                <p style="font-size:2rem; margin-bottom:20px;">📱</p>
                <p>تم تسجيل الدخول بنجاح</p>
                <p style="font-size:0.8rem; color:#777; margin-top:10px;">هنا يظهر الفيديو الرئيسي</p>
                <button onclick="logoutUser()" style="margin-top:30px; background:#ff2b55; color:#fff; border:none; padding:10px 30px; border-radius:12px; cursor:pointer;">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ===== استيراد Firebase =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ===== إعدادات Firebase الخاصة بك =====
        const firebaseConfig = {
            apiKey: "AIzaSyAI23gvlRESb1Eivn5xjuq1y9U-pcixYsw",
            authDomain: "fit-app-1c1a8.firebaseapp.com",
            projectId: "fit-app-1c1a8",
            storageBucket: "fit-app-1c1a8.firebasestorage.app",
            messagingSenderId: "70249998607",
            appId: "1:70249998607:web:129b8c7e919eb1152bb67a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // ===== دوال مساعدة =====
        window.hideModals = function() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('signupModal').classList.remove('active');
        };

        function showAppScreen(username) {
            document.getElementById('authScreen').style.display = 'none';
            const appScreen = document.getElementById('appScreen');
            appScreen.style.display = 'flex';
            document.getElementById('welcomeMsg').innerText = 'مرحباً، ' + username;
        }

        function showAuthScreen() {
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('authScreen').style.display = 'flex';
        }

        window.logoutUser = function() {
            signOut(auth).then(() => {
                localStorage.removeItem('fit_my_user_cached');
                showAuthScreen();
            }).catch(() => {
                localStorage.removeItem('fit_my_user_cached');
                showAuthScreen();
            });
        };

        // ===== زر Google (الشغال 100%) =====
        document.getElementById('googleAuthBtn').onclick = async function() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // إنشاء اسم مستخدم من البريد
                let username = user.email.split('@')[0].replace(/[^a-zA-Z0-9]/g, '');
                username = '@' + username;
                
                // حفظ في localStorage
                localStorage.setItem('fit_my_user_cached', username);
                
                // التحقق من وجود المستخدم في Firestore
                const userRef = doc(db, "users", username);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    // إنشاء حساب جديد
                    const newUser = {
                        username: username,
                        fullName: user.displayName || "مستخدم ZAN",
                        avatar: user.photoURL || "",
                        bio: "",
                        youtube: "",
                        following: [],
                        followers: [],
                        favorites: [],
                        notifications: [],
                        chats: {},
                        isVerified: false,
                        lastUsernameChange: 0,
                        email: user.email
                    };
                    await setDoc(userRef, newUser);
                }
                
                // توجيه المستخدم للتطبيق
                showAppScreen(username);
                
            } catch (error) {
                console.error("خطأ:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    alert("حدث خطأ: " + error.message);
                }
            }
        };

        // ===== أزرار أخرى =====
        document.getElementById('showLoginBtn').onclick = () => document.getElementById('loginModal').classList.add('active');
        document.getElementById('showSignupBtn').onclick = () => document.getElementById('signupModal').classList.add('active');

        document.getElementById('loginBtn').onclick = function() {
            const username = document.getElementById('loginUsername').value.trim();
            if (username) {
                localStorage.setItem('fit_my_user_cached', username);
                showAppScreen(username);
                hideModals();
            } else {
                alert("أدخل اسم المستخدم");
            }
        };

        document.getElementById('signupBtn').onclick = function() {
            const fullName = document.getElementById('signupFullName').value.trim();
            const username = document.getElementById('signupUsername').value.trim();
            if (fullName && username) {
                localStorage.setItem('fit_my_user_cached', username);
                showAppScreen(username);
                hideModals();
            } else {
                alert("املأ جميع الحقول");
            }
        };

        // ===== التحقق من حالة تسجيل الدخول عند تحميل الصفحة =====
        const savedUser = localStorage.getItem('fit_my_user_cached');
        if (savedUser) {
            showAppScreen(savedUser);
        }
    </script>
</body>
</html>
