<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الفارس</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الفارس">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg-color: #121214;
            --container-bg: #1a1a24;
            --editor-bg: #1e1e24;
            --primary-color: #00e676;
            --text-color: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding: 10px; 
            margin: 0; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            max-width: 600px;
            margin: 5px auto;
        }

        .btn-index {
            background: #ff9100;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .file-buttons {
            display: flex;
            gap: 5px;
        }

        .btn-file {
            background: #2979ff;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .container { 
            max-width: 600px; 
            margin: 10px auto; 
            background: var(--container-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 12px 32px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column;
        }

        h2 { color: var(--primary-color); margin: 0 0 15px 0; text-align: center; font-size: 24px; }

        .editor-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            background: var(--editor-bg);
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .editor-backdrop, textarea#code {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            border: none;
            outline: none;
            background: transparent;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }

        textarea#code {
            color: transparent;
            caret-color: #fff; 
            z-index: 2;
            resize: none;
        }

        .editor-backdrop {
            color: #fff; 
            z-index: 1;
            pointer-events: none;
            overflow-y: auto;
        }

        .kw-func { color: #00ff66 !important; } 
        .kw-bracket { color: #d500f9 !important; } 
        .kw-string { color: #ffeb3b !important; } 
        .kw-keyword { color: #ff9100 !important; } 

        .btn-run { 
            width: 100%; 
            background: linear-gradient(135deg, #00e676, #00b0ff); 
            color: white; 
            border: none; 
            padding: 14px; 
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }

        .btn-share {
            width: 100%;
            background: #444;
            color: white;
            border: none;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        h3 { margin: 10px 0 5px 0; color: #bbb; font-size: 16px; }
        
        textarea#output { 
            width: 100%;
            height: 120px;
            background: #09090d; 
            color: #00ff66; 
            padding: 12px; 
            border-radius: 10px; 
            font-family: monospace; 
            font-size: 16px; 
            border: 1px solid #222;
            border-right: 5px solid var(--primary-color); 
            box-sizing: border-box; 
            resize: none;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -260px;
            width: 240px;
            height: 100%;
            background: #1e1e28;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 10;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar h4 { margin-top: 0; color: #ff9100; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .sidebar-item {
            background: #2a2a35;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .sidebar-item:hover { background: #00e676; color: #121214; }
        .close-sidebar {
            background: #ff1744; color: white; border: none; padding: 5px 10px; 
            border-radius: 4px; cursor: pointer; float: left; font-size: 12px;
        }
        
        #screen-video {
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
            border-radius: 8px;
            display: none;
            background: #000;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="btn-index" onclick="toggleSidebar()">فهرس الدوال</button>
    <div class="file-buttons">
        <button class="btn-file" onclick="saveToFile()">حفظ الملف</button>
        <button class="btn-file" onclick="document.getElementById('file-input').click()">فتح ملف</button>
        <input type="file" id="file-input" style="display: none;" onchange="loadFromFile(event)">
    </div>
</div>

<div id="sidebar" class="sidebar">
    <button class="close-sidebar" onclick="toggleSidebar()">إغلاق</button>
    <h4>فهرس الدوال</h4>
    <div class="sidebar-item" onclick="insertFunc('طباعة(\"\")')">طباعة()</div>
    <div class="sidebar-item" onclick="insertFunc('ادخل(\"\")')">ادخل()</div>
    <div class="sidebar-item" onclick="insertFunc('طول(\"\")')">طول()</div>
    <div class="sidebar-item" onclick="insertFunc('مجموع([])')">مجموع()</div>
    <div class="sidebar-item" onclick="insertFunc('أكبر([])')">أكبر()</div>
    <div class="sidebar-item" onclick="insertFunc('أصغر([])')">أصغر()</div>
    <div class="sidebar-item" onclick="insertFunc('مطلق()')">مطلق()</div>
    <div class="sidebar-item" onclick="insertFunc('نوع()')">نوع()</div>
    <div class="sidebar-item" onclick="insertFunc('عكس()')">عكس()</div>
    <div class="sidebar-item" onclick="insertFunc('تحويل_رقم()')">تحويل_رقم()</div>
    <div class="sidebar-item" onclick="insertFunc('تحويل_نص()')">تحويل_نص()</div>
</div>

<div class="container">
    <h2>تطبيق الفارس</h2>

    <p style="margin: 0 0 5px 0; font-size: 14px; color: #ccc;">اكتب الشفرة البرمجية:</p>
    <div class="editor-wrapper">
        <div id="backdrop" class="editor-backdrop"></div>
        <textarea id="code" oninput="updateHighlight()" placeholder="ابدأ كتابة كودك العربي هنا..."></textarea>
    </div>
    
    <button class="btn-run" onclick="runFarisEngine()">تشغيل البرمجية الذكية</button>
    <button class="btn-share" onclick="shareScreen()">مشاركة شاشة العرض</button>

    <video id="screen-video" autoplay playsinline muted></video>

    <h3>مخرجات التشغيل:</h3>
    <textarea id="output" readonly placeholder="ستظهر المخرجات هنا..."></textarea>
</div>

<script>
    const codeArea = document.getElementById('code');
    const backdrop = document.getElementById('backdrop');
    const outputDiv = document.getElementById('output');
    const sidebar = document.getElementById('sidebar');
    const videoElem = document.getElementById('screen-video');

    function toggleSidebar() {
        sidebar.classList.toggle('open');
    }

    // كتابة الدالة في مكان مؤشر الكتابة الحالي لضمان عدم ضياع الترتيب
    function insertFunc(funcText) {
        const start = codeArea.selectionStart;
        const end = codeArea.selectionEnd;
        const text = codeArea.value;
        codeArea.value = text.substring(0, start) + funcText + text.substring(end);
        codeArea.selectionStart = codeArea.selectionEnd = start + funcText.length;
        updateHighlight();
        toggleSidebar();
        codeArea.focus();
    }

    // دالة الحفظ المعدلة مع حقن ترميز UTF-8 الإجباري
    function saveToFile() {
        const codeText = codeArea.value;
        if (!codeText.trim()) {
            alert("المحرر فارغ، اكتب كوداً أولاً ليتم حفظه.");
            return;
        }
        
        let fullPageCode = document.documentElement.outerHTML;
        // استبدال لحقن الكود العربي المكتوب في التكست إريا للنسخة الجديدة
        fullPageCode = fullPageCode.replace('placeholder="ابدأ كتابة كودك العربي هنا..."></textarea>', `placeholder="ابدأ كتابة كودك العربي هنا...">${codeText}</textarea>`);

        // إضافة ترويسة البيانت الفريدة لمنع ظهور الرموز الغريبة وتثبيت UTF-8
        const blob = new Blob(["\ufeff", fullPageCode], { type: 'text/html;charset=utf-8' });
        const link = document.createElement('a');
        link.download = 'برنامج_الفارس_المحفوظ.html'; 
        link.href = window.URL.createObjectURL(blob);
        link.click();
    }

    function loadFromFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(e.target.result, 'text/html');
            const importedCode = doc.getElementById('code');
            if (importedCode) {
                codeArea.value = importedCode.value;
            } else {
                codeArea.value = e.target.result;
            }
            updateHighlight();
        };
        reader.readAsText(file, "UTF-8"); // القراءة بترميز UTF-8
    }

    function updateHighlight() {
        let text = codeArea.value;
        text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        text = text.replace(/(['"“’])(.*?)\1/g, '<span class="kw-string">$1$2$1</span>');

        const functions = ['طباعة', 'ادخل', 'تحويل_رقم', 'تحويل_نص', 'نوع', 'عكس', 'طول', 'مجموع', 'أكبر', 'أصغر', 'مطلق'];
        functions.forEach(func => {
            const regex = new RegExp(`\\b${func}\\b`, 'g');
            text = text.replace(regex, `<span class="kw-func">${func}</span>`);
        });

        text = text.replace(/\bإذا\b/g, '<span class="kw-keyword">إذا</span>').replace(/\bوإلا\b/g, '<span class="kw-keyword">وإلا</span>');
        text = text.replace(/([\(\)\[\]\{\}])/g, '<span class="kw-bracket">$1</span>');
        backdrop.innerHTML = text + "\n";
    }

    codeArea.addEventListener('scroll', () => {
        backdrop.scrollTop = codeArea.scrollTop;
    });

    async function shareScreen() {
        try {
            const mediaStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            videoElem.srcObject = mediaStream;
            videoElem.style.display = 'block';
            mediaStream.getVideoTracks()[0].onended = () => {
                videoElem.style.display = 'none';
            };
        } catch (err) {
            alert("مشاركة الشاشة مدعومة في متصفحات الكمبيوتر وبعض متصفحات الهواتف المتقدمة.");
        }
    }

    function runFarisEngine() {
        let codeInput = codeArea.value;
        outputDiv.value = "جاري التشغيل..."; 
        let logs = [];

        const طباعة = (...args) => {
            logs.push(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' '));
        };
        const ادخل = (message) => prompt(message) || "";
        const تحويل_رقم = (x) => Number(x);
        const تحويل_نص = (x) => String(x);
        const نوع = (x) => typeof x;
        const عكس = (x) => typeof x === 'string' ? x.split('').reverse().join('') : [...x].reverse();
        const طول = (x) => x.length;
        const مجموع = (arr) => arr.reduce((a, b) => a + b, 0);
        const أكبر = (arr) => Math.max(...arr);
        const أصغر = (arr) => Math.min(...arr);
        const مطلق = (x) => Math.abs(x);

        let processedCode = codeInput.replace(/[“”]/g, '"').replace(/[’’]/g, "'");
        processedCode = processedCode.replace(/\bإذا\b/g, 'if').replace(/\bوإلا\b/g, 'else');

        try {
            const compiler = new Function(
                'طباعة', 'ادخل', 'تحويل_رقم', 'تحويل_نص', 'نوع', 'عكس', 'طول', 'مجموع', 'أكبر', 'أصغر', 'مطلق', 
                processedCode
            );
            
            compiler(طباعة, ادخل, تحويل_رقم, تحويل_نص, نوع, عكس, طول, مجموع, أكبر, أصغر, مطلق);

            if (logs.length > 0) {
                outputDiv.value = logs.join('\n');
            } else {
                outputDiv.value = "تم التنفيذ بنجاح.";
            }

        } catch (error) {
            outputDiv.value = "❌ خطأ:\n" + error.message;
        }
    }

    updateHighlight();
</script>
</body>
</html>
