<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق قَيِّم</title>
    <style>
        :root {
            --primary-brown: #8B5A2B;
            --light-brown: #D2B48C;
            --dark-brown: #5C3A21;
            --bg-color: #FAFAFA;
            --card-bg: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EFEFEF;
            color: var(--dark-brown);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-color);
            height: 100%;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; text-align: center; align-items: center; justify-content: center; }
        .screen.active { display: flex; }

        .btn {
            background-color: var(--primary-brown);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            width: 90%;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover:not(:disabled) { background-color: var(--dark-brown); }
        .btn:disabled { background-color: #cccccc !important; color: #777777 !important; cursor: not-allowed !important; }

        .pledge-box {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: right;
            border: 1px solid #EBEBEB;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            width: 85%;
        }
        .alert-box { background-color: #FFF0F0; border-right: 4px solid #D32F2F; padding: 10px 12px; border-radius: 8px; margin-top: 15px; }
        .alert-box p { margin: 0; font-size: 12px; color: #D32F2F; line-height: 1.5; font-weight: bold; }

        .checkbox-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; font-weight: bold; cursor: pointer; width: 85%; }
        .checkbox-container input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary-brown); }

        .main-screen { display: none; flex-direction: column; height: 100%; background-color: var(--bg-color); }
        .main-screen.active { display: flex; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: var(--card-bg); border-bottom: 1px solid #EBEBEB; }
        .header-logo { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
        .header-title { font-size: 22px; font-weight: bold; color: var(--primary-brown); }

        .feed { flex: 1; overflow-y: auto; padding-bottom: 70px; }
        .post { background: var(--card-bg); border-bottom: 1px solid #EBEBEB; padding: 15px; margin-bottom: 10px; text-align: right; }
        
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background-color: var(--card-bg); border-top: 1px solid #EBEBEB; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { font-size: 22px; color: var(--light-brown); cursor: pointer; }
        .nav-item.active { color: var(--primary-brown); }

        .dhikr-modal { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .dhikr-content { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; width: 70%; border: 2px solid var(--primary-brown); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="login-screen" class="screen active">
            <h1 style="color: var(--primary-brown);">قَيِّم</h1>
            <button class="btn" onclick="window.signInWithGoogle()">تسجيل الدخول بواسطة Google</button>
        </div>

        <div id="pledge-screen" class="screen">
            <h2 style="color: var(--primary-brown);">شروط الاستخدام</h2>
            <div class="pledge-box">
                <h3>أتعهد بالآتي:</h3>
                <ul>
                    <li>يمنع السب والشتم.</li>
                    <li>يمنع التنمر.</li>
                    <li>تمنع إثارة الفتنة.</li>
                </ul>
                <div class="alert-box"><p>ملاحظة: مخالفة القوانين تعني إحالة بياناتك للجهات القانونية.</p></div>
            </div>
            <label class="checkbox-container">
                <input type="checkbox" id="agree-checkbox" onchange="window.toggleAcceptButton()">
                قرأت الشروط وأتعهد بالالتزام بها
            </label>
            <button class="btn" id="accept-btn" onclick="window.acceptPledge()" disabled>يرجى قراءة الشروط (30 ثانية)</button>
            <p id="location-status" style="color: #D32F2F; font-size: 13px; margin-top: 10px;"></p>
        </div>

        <div id="main-screen" class="main-screen">
            <div class="header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://via.placeholder.com/40/8B5A2B/FFFFFF?text=Q" class="header-logo">
                    <span class="header-title">قَيِّم</span>
                </div>
            </div>
            <div class="feed">
                <div class="post"><strong>فارس</strong><p>مرحباً بكم في قَيِّم!</p></div>
            </div>
            <div class="bottom-nav">
                <span class="nav-item active">🏠</span><span class="nav-item">🔍</span><span class="nav-item">➕</span><span class="nav-item">👤</span>
            </div>
        </div>

        <div id="dhikr-modal" class="dhikr-modal">
            <div class="dhikr-content">
                <div id="dhikr-text" style="font-size: 20px; margin-bottom:20px;">سبحان الله وبحمده</div>
                <button class="btn" style="width:100%" onclick="window.closeDhikr()">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAI23gvlRESb1Eivn5xjuq1y9U-pcixYsw",
            authDomain: "fit-app-1c1a8.firebaseapp.com",
            projectId: "fit-app-1c1a8",
            storageBucket: "fit-app-1c1a8.firebasestorage.app",
            messagingSenderId: "70249998607",
            appId: "1:70249998607:web:129b8c7e919eb1152bb67a",
            measurementId: "G-PD6NX9CH5B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.showScreen = function(screenId) {
            document.querySelectorAll('.screen, .main-screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'pledge-screen') window.startTimer();
        };

        window.startTimer = function() {
            const btn = document.getElementById('accept-btn');
            const checkbox = document.getElementById('agree-checkbox');
            let timeLeft = 30;
            btn.disabled = true;
            checkbox.disabled = true;
            const timer = setInterval(() => {
                timeLeft--;
                btn.innerText = `يرجى قراءة الشروط (${timeLeft} ثانية)`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.innerText = "أوافق وأسمح بالوصول للموقع";
                    checkbox.disabled = false;
                }
            }, 1000);
        };

        window.toggleAcceptButton = function() {
            const checkbox = document.getElementById('agree-checkbox');
            document.getElementById('accept-btn').disabled = !checkbox.checked;
        };

        window.signInWithGoogle = () => signInWithPopup(auth, provider).then(() => window.showScreen('pledge-screen')).catch(e => alert(e.message));

        window.acceptPledge = function() {
            navigator.geolocation.getCurrentPosition(
                () => { window.showScreen('main-screen'); window.startDhikrTimer(); },
                (e) => document.getElementById('location-status').innerText = "يجب السماح للموقع من إعدادات المتصفح للدخول."
            );
        };

        window.startDhikrTimer = () => setInterval(() => { document.getElementById('dhikr-modal').style.display = 'flex'; }, 3600000);
        window.closeDhikr = () => document.getElementById('dhikr-modal').style.display = 'none';
    </script>
</body>
</html>
