<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فت - FIT</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --primary-color: #1da1f2;
            --text-color: #e7e9ea;
            --text-muted: #71767b;
            --border-color: #2f3336;
            --hover-color: #16181c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
        }

        .hidden { display: none !important; }

        .app-header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        .header-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            padding: 10px 0 5px 0;
        }
        .header-tabs { display: flex; width: 100%; }
        .tab-btn {
            flex: 1; background: none; border: none; color: var(--text-muted);
            padding: 15px 0; font-weight: bold; font-size: 15px; cursor: pointer; text-align: center; position: relative;
        }
        .tab-btn.active { color: var(--text-color); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 35%; right: 35%; height: 4px; background-color: var(--primary-color); border-radius: 999px;
        }

        .post-card { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; position: relative; }
        .post-card:hover { background-color: var(--hover-color); }
        
        /* تصميم كرت الإعلان المدمج المطور */
        .ad-native-card { 
            background-color: #0b141a !important; 
            border-bottom: 1px solid var(--border-color); 
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .ad-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .ad-badge { 
            font-size: 11px; 
            background-color: #ffcc00; 
            color: black; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
        }
        .native-ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
            min-height: 90px;
        }

        .post-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; cursor: pointer; background: #222; }
        .post-main { flex-grow: 1; }
        .post-header { display: flex; align-items: center; justify-content: space-between; gap: 5px; }
        .post-meta-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .post-username { font-weight: bold; color: var(--text-color); cursor: pointer; }
        .post-username:hover { text-decoration: underline; }
        .post-handle { color: var(--text-muted); font-size: 14px; }
        .post-date { color: var(--text-muted); font-size: 13px; }
        .post-text { font-size: 15px; margin-top: 5px; line-height: 1.4; white-space: pre-wrap; }
        
        .post-media { width: 100%; border-radius: 16px; border: 1px solid var(--border-color); margin-top: 10px; max-height: 350px; object-fit: cover; cursor: pointer; display: block; }
        
        .post-actions { display: flex; justify-content: space-between; max-width: 400px; margin-top: 12px; }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .action-btn:hover { color: var(--primary-color); }
        .delete-btn { color: #f4212e !important; background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 5px; }

        .comments-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color); }

        .profile-banner { width: 100%; height: 150px; background-color: #1e2022; background-size: cover; background-position: center; position: relative; }
        .profile-info-box { padding: 0 15px; position: relative; margin-top: -45px; margin-bottom: 15px; }
        .profile-large-avatar { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #000; object-fit: cover; background: #222; }
        .profile-stats { display: flex; gap: 20px; margin-top: 10px; font-size: 14px; }
        .profile-stats span { color: var(--text-muted); cursor: pointer; }
        .profile-stats span:hover { text-decoration: underline; color: var(--text-color); }
        .profile-stats strong { color: var(--text-color); }
        .bio-text { font-size: 15px; margin: 10px 0; color: var(--text-color); }

        .profile-tabs { display: flex; border-bottom: 1px solid var(--border-color); }
        .p-tab { flex: 1; text-align: center; padding: 15px 0; color: var(--text-muted); font-weight: bold; cursor: pointer; }
        .p-tab.active { color: var(--text-color); border-bottom: 3px solid var(--primary-color); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; }
        .nav-item.active { color: var(--primary-color); }

        .tweet-fab {
            position: fixed; bottom: 75px; left: 20px; width: 55px; height: 55px; background-color: var(--primary-color);
            border-radius: 50%; border: none; color: white; font-size: 24px; font-weight: bold;
            display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0px 4px 10px rgba(29, 161, 242, 0.3); z-index: 99;
        }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(91,112,131,0.4); display: flex; justify-content: center; align-items: flex-start; padding-top: 50px; z-index: 1000; }
        .editor-modal { background: #000; width: 100%; max-width: 500px; border-radius: 16px; border: 1px solid var(--border-color); padding: 15px; color: white;}
        
        .fullscreen-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:2000; }
        .fullscreen-content { max-width: 95%; max-height: 85%; border-radius: 8px; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .close-fullscreen-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: white; width: 45px; height: 45px; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        .auth-input, textarea { width: 100%; background: transparent; border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background-color: var(--primary-color); color: #fff; border: none; border-radius: 9999px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .upload-label { display: block; background: #2f3336; color: #fff; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; cursor: pointer; font-size: 14px; }
        
        .auth-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .notif-item { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .notif-unread { background: #0e161f; }
    </style>
</head>
<body>

    <div id="auth-container" class="auth-screen">
        <h1 style="font-size: 36px; margin-bottom: 20px;">منصة فت - FIT</h1>
        <button id="google-login-btn" class="btn" style="background:#fff; color:#000; width:100%; max-width:320px; margin-bottom:15px;">الدخول بواسطة Google</button>
        <input type="email" id="auth-email" class="auth-input" style="max-width:320px;" placeholder="البريد الإلكتروني">
        <input type="password" id="auth-password" class="auth-input" style="max-width:320px;" placeholder="كلمة المرور">
        <button id="email-action-btn" class="btn" style="width:100%; max-width:320px;">دخول / تسجيل</button>
        <p id="toggle-auth-text" style="color:var(--text-muted); margin-top:15px; cursor:pointer;" onclick="toggleAuthMode()">ليس لديك حساب؟ سجل الآن</p>
    </div>

    <button id="global-tweet-btn" class="tweet-fab hidden" onclick="openEditor()">✍️</button>

    <div id="editor-modal-container" class="modal-overlay hidden">
        <div class="editor-modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <button class="action-btn" onclick="closeEditor()" style="font-size:18px;">❌</button>
                <button id="submit-post-btn" class="btn" onclick="submitNewPost()">تفتيت</button>
            </div>
            <textarea id="post-text" placeholder="وش قاعد يصير معك الحين؟" rows="4" style="border:none; font-size:18px;"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label for="file-input" style="cursor:pointer; color:var(--primary-color); font-weight:bold;">📸 🎥 إرفاق ميديا (صورة / فيديو)</label>
                <input type="file" id="file-input" accept="image/*,video/*" class="hidden" onchange="previewFile()">
                <span id="file-preview-name" style="color:var(--text-muted); font-size:13px;"></span>
            </div>
        </div>
    </div>

    <div id="fullscreen-viewer" class="fullscreen-overlay hidden">
        <button class="close-fullscreen-btn" onclick="closeFullscreen()">❌</button>
        <div id="fullscreen-content-area" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
    </div>

    <div id="users-modal-overlay" class="modal-overlay hidden">
        <div class="editor-modal" style="max-height: 400px; overflow-y: auto;">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border-color); padding-bottom:10px; margin-bottom:10px;">
                <h3 id="users-modal-title" style="margin:0;">القائمة</h3>
                <button class="action-btn" onclick="closeUsersModal()" style="font-size:16px;">❌</button>
            </div>
            <div id="users-modal-list"></div>
        </div>
    </div>

    <div id="app-container" class="container hidden">
        
        <section id="feed-page" class="page">
            <div class="app-header">
                <div class="header-title">فت</div>
                <div class="header-tabs">
                    <button class="tab-btn active" id="tab-for-you" onclick="switchFeedTab('all')">لك</button>
                    <button class="tab-btn" id="tab-following" onclick="switchFeedTab('following')">أتابعه</button>
                </div>
            </div>
            <div id="posts-container"></div>
        </section>

        <section id="search-page" class="page hidden">
            <div class="app-header"><div class="header-title">البحث</div></div>
            <div style="padding:15px;"><input type="text" id="search-input" class="auth-input" placeholder="🔍 ابحث في تفتيتات فت..."></div>
            <div id="search-results"></div>
        </section>

        <section id="notifications-page" class="page hidden">
            <div class="app-header"><div class="header-title">التنبيهات الإشعارات</div></div>
            <div id="notifications-container"></div>
        </section>

        <section id="messages-page" class="page hidden">
            <div class="app-header"><div class="header-title">الرسائل الخاصة</div></div>
            <div id="chat-users-container"></div>
            
            <div id="active-chat-box" class="hidden" style="padding:15px;">
                <button class="btn" onclick="exitChat()" style="margin-bottom:10px; padding:5px 15px;">⬅️ رجوع</button>
                <div id="chat-messages-list" style="height:300px; overflow-y:auto; border:1px solid var(--border-color); padding:10px; margin-bottom:10px; display:flex; flex-direction:column; gap:8px;"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chat-msg-input" class="auth-input" placeholder="اكتب رسالتك الخاصة...">
                    <button class="btn" onclick="sendDirectMessage()">إرسال</button>
                </div>
            </div>
        </section>

        <section id="profile-page" class="page hidden">
            <div class="profile-banner" id="my-profile-banner"></div>
            <div class="profile-info-box">
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <img class="profile-large-avatar" id="my-profile-avatar" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png">
                    <button id="profile-action-btn" class="btn hidden" onclick="handleProfileFollowToggle()"></button>
                </div>
                <h2 id="my-display-name" style="margin:5px 0 0 0;">...</h2>
                <p id="my-user-handle" style="margin:0; color:var(--text-muted); font-size:14px;">@...</p>
                
                <div class="bio-text" id="my-bio-text">...</div>
                
                <div class="profile-stats">
                    <span id="stat-link-following">مُتابَعين: <strong id="cnt-following">0</strong></span>
                    <span id="stat-link-followers">المتابعون: <strong id="cnt-followers">0</strong></span>
                </div>

                <div id="edit-profile-section" style="background:#16181c; padding:15px; border-radius:12px; margin-top:15px;">
                    <h4 style="margin:0 0 10px 0; color:var(--primary-color);">⚙️ تعديل بيانات الملف الشخصي</h4>
                    <input type="text" id="set-name" class="auth-input" placeholder="اسم العرض الجديد">
                    <input type="text" id="set-handle" class="auth-input" placeholder="اسم المستخدم (اليوزر) الجديد">
                    <input type="text" id="set-bio" class="auth-input" placeholder="اكتب لمحة تعريفية (Bio)...">
                    
                    <label for="avatar-file" class="upload-label" id="avatar-label">👤 اختر صورة الملف الشخصي</label>
                    <input type="file" id="avatar-file" accept="image/*" class="hidden" onchange="document.getElementById('avatar-label').innerText='📁 تم اختيار الصورة الشخصية'">
                    
                    <label for="banner-file" class="upload-label" id="banner-label">🖼️ اختر صورة البنر العلوية</label>
                    <input type="file" id="banner-file" accept="image/*" class="hidden" onchange="document.getElementById('banner-label').innerText='📁 تم اختيار البنر'">

                    <button class="btn" style="width:100%; margin-top:5px;" id="save-profile-btn" onclick="saveProfileData()">حفظ التغييرات بالكامل</button>
                    <button class="btn" style="background:#f4212e; width:100%; margin-top:15px;" onclick="logOut()">تسجيل الخروج</button>
                </div>
            </div>

            <div class="profile-tabs">
                <div class="p-tab active" id="ptab-posts" onclick="switchProfileTab('posts')">التفتيتات</div>
                <div class="p-tab" id="ptab-media" onclick="switchProfileTab('media')">الوسائط</div>
                <div class="p-tab" id="ptab-likes" onclick="switchProfileTab('likes')">الإعجابات</div>
            </div>
            <div id="profile-posts-container"></div>
        </section>

        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-btn-feed" onclick="navigate('feed-page', this)">🏠</button>
            <button class="nav-item" id="nav-btn-search" onclick="navigate('search-page', this)">🔍</button>
            <button class="nav-item" id="nav-btn-notifications" onclick="navigate('notifications-page', this)">🔔</button>
            <button class="nav-item" id="nav-btn-messages" onclick="navigate('messages-page', this)">✉️</button>
            <button class="nav-item" id="nav-btn-profile" onclick="viewUserProfile(null)">👤</button>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAI23gvlRESb1Eivn5xjuq1y9U-pcixYsw",
            authDomain: "fit-app-1c1a8.firebaseapp.com",
            projectId: "fit-app-1c1a8",
            storageBucket: "fit-app-1c1a8.appspot.com",
            messagingSenderId: "70249998607",
            appId: "1:70249998607:web:129b8c7e919eb1152bb67a",
            measurementId: "G-PD6NX9CH5B"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let viewedUid = null; 
        let isSignUpMode = false;
        let currentFeedTab = 'all'; 
        let currentProfileTab = 'posts';
        let selectedChatUid = null;
        let timelineUnsubscribe = null; 

        function formatPostDate(timestamp) {
            if (!timestamp) return "الآن";
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60000);
            if (diffMins < 1) return "الآن";
            if (diffMins < 60) return `منذ ${diffMins} د`;
            if (diffHours < 24) return `منذ ${diffHours} س`;
            return date.toLocaleDateString('ar-SA', { day: 'numeric', month: 'short' });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('global-tweet-btn').classList.remove('hidden');
                
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (!doc.exists) {
                        db.collection('users').doc(user.uid).set({
                            uid: user.uid,
                            name: user.displayName || "عضو فت",
                            handle: user.email.split('@')[0],
                            bio: "لا توجد لمحة تعريفية.",
                            avatar: "https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png",
                            banner: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600"
                        });
                    }
                    if(!viewedUid || viewedUid === currentUser.uid) {
                        updateProfileUI(doc.data());
                    }
                });

                loadTimeline();
                loadChatUsersList();
                loadNotifications();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
                document.getElementById('global-tweet-btn').classList.add('hidden');
                if(timelineUnsubscribe) timelineUnsubscribe();
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        });
        document.getElementById('email-action-btn').addEventListener('click', () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("اكتب بريدك وباسوردك");
            if(isSignUpMode) {
                auth.createUserWithEmailAndPassword(email, password).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, password).catch(e => alert(e.message));
            }
        });
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('email-action-btn').innerText = isSignUpMode ? "سجل حسابك الآن" : "دخول / تسجيل";
            document.getElementById('toggle-auth-text').innerText = isSignUpMode ? "لديك حساب بالفعل? ادخل هنا" : "ليس لديك حساب؟ سجل الآن";
        }

        function openEditor() { document.getElementById('editor-modal-container').classList.remove('hidden'); }
        function closeEditor() { document.getElementById('editor-modal-container').classList.add('hidden'); }
        
        function previewFile() {
            const file = document.getElementById('file-input').files[0];
            if(file) {
                const isVideo = file.type.startsWith('video/');
                document.getElementById('file-preview-name').innerText = isVideo ? `🎥 تم اختيار فيديو` : `📸 تم اختيار صورة`;
            } else {
                document.getElementById('file-preview-name').innerText = '';
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function openFullscreen(url, type) {
            const viewer = document.getElementById('fullscreen-viewer');
            const area = document.getElementById('fullscreen-content-area');
            area.innerHTML = "";

            if (type === 'video') {
                area.innerHTML = `<video src="${url}" class="fullscreen-content" controls autoplay></video>`;
            } else {
                area.innerHTML = `<img src="${url}" class="fullscreen-content">`;
            }
            viewer.classList.remove('hidden');
        }

        function closeFullscreen() {
            const viewer = document.getElementById('fullscreen-viewer');
            const area = document.getElementById('fullscreen-content-area');
            area.innerHTML = "";
            viewer.classList.add('hidden');
        }

        async function saveProfileData() {
            const saveBtn = document.getElementById('save-profile-btn');
            const name = document.getElementById('set-name').value;
            const handle = document.getElementById('set-handle').value;
            const bio = document.getElementById('set-bio').value;
            const avatarFile = document.getElementById('avatar-file').files[0];
            const bannerFile = document.getElementById('banner-file').files[0];

            saveBtn.innerText = "جاري الحفظ الفوري...";
            saveBtn.disabled = true;

            let updates = {};
            if(name) updates.name = name;
            if(handle) updates.handle = handle;
            if(bio) updates.bio = bio;

            try {
                if (avatarFile) updates.avatar = await fileToBase64(avatarFile);
                if (bannerFile) updates.banner = await fileToBase64(bannerFile);

                if(Object.keys(updates).length > 0) {
                    await db.collection('users').doc(currentUser.uid).update(updates);
                    alert("تم تحديث معلومات حسابك وصورك بنجاح! ✨");
                }
            } catch(e) { alert(e.message); }

            saveBtn.innerText = "حفظ التغييرات بالكامل";
            saveBtn.disabled = false;
        }

        function updateProfileUI(uData) {
            if(!uData) return;
            document.getElementById('my-display-name').innerText = uData.name || "عضو فت";
            document.getElementById('my-user-handle').innerText = `@${uData.handle || 'user'}`;
            document.getElementById('my-bio-text').innerText = uData.bio || "لا توجد لمحة تعريفية.";
            document.getElementById('my-profile-avatar').src = uData.avatar || "https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png";
            const bannerUrl = uData.banner || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600';
            document.getElementById('my-profile-banner').style.backgroundImage = `url('${bannerUrl}')`;
        }

        async function submitNewPost() {
            const text = document.getElementById('post-text').value;
            const file = document.getElementById('file-input').files[0];
            const submitBtn = document.getElementById('submit-post-btn');

            if(!text && !file) return alert("اكتب تفتيتة أولاً!");
            submitBtn.innerText = "جاري النشر...";
            submitBtn.disabled = true;

            let fileUrlData = "";
            let fileTypeData = "";

            try {
                if(file) {
                    fileUrlData = await fileToBase64(file);
                    fileTypeData = file.type.startsWith('video/') ? "video" : "image";
                }

                const uSnap = await db.collection('users').doc(currentUser.uid).get();
                const uData = uSnap.data() || {};

                await db.collection('posts').add({
                    userId: currentUser.uid,
                    userName: uData.name || currentUser.email.split('@')[0],
                    userHandle: uData.handle || currentUser.email.split('@')[0],
                    userAvatar: uData.avatar || "https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png",
                    text: text,
                    fileUrl: fileUrlData,
                    fileType: fileTypeData,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    likedBy: []
                });

                document.getElementById('post-text').value = "";
                document.getElementById('file-input').value = "";
                document.getElementById('file-preview-name').innerText = "";
                closeEditor();
            } catch (err) { alert(err.message); }

            submitBtn.innerText = "تفتيت";
            submitBtn.disabled = false;
        }

        // دالة حقن إعلانات أدستيرا المدمجة بواسطة Iframe معزول ومضمون التشغيل أونلاين
        function injectNativeAdIntoElement(elementId) {
            setTimeout(() => {
                const targetDiv = document.getElementById(elementId);
                if (!targetDiv) return;

                // نقوم بإنشاء iframe برمجياً لحظر أي تعارض من المتصفحات وتخطي الكاش
                const iframe = document.createElement('iframe');
                iframe.style.width = "320px";
                iframe.style.height = "90px";
                iframe.style.border = "none";
                iframe.style.overflow = "hidden";
                
                targetDiv.appendChild(iframe);

                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(`
                    <html dir="rtl">
                    <head><style>body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; background: transparent; }</style></head>
                    <body>
                        <div id="ad-container-box"></div>
                        <script type="text/javascript">
                            window.atOptions = {
                                'key' : 'af18d3bae069dfe7f8f2ba1a799ae1eb',
                                'format' : 'iframe',
                                'height' : 90,
                                'width' : 320,
                                'params' : {}
                            };
                            var s = document.createElement('script');
                            s.type = 'text/javascript';
                            s.src = "https://pl29489332.effectivecpmnetwork.com/af18d3bae069dfe7f8f2ba1a799ae1eb/invoke.js";
                            document.body.appendChild(s);
                        <\/script>
                    </body>
                    </html>
                `);
                iframeDoc.close();
            }, 400);
        }

        function loadTimeline() {
            if(timelineUnsubscribe) timelineUnsubscribe();

            timelineUnsubscribe = db.collection('posts').orderBy('createdAt', 'desc').onSnapshot(async snapshot => {
                const container = document.getElementById('posts-container');
                const profileContainer = document.getElementById('profile-posts-container');
                container.innerHTML = "";
                profileContainer.innerHTML = "";

                if(currentFeedTab === 'all' && !document.getElementById('feed-page').classList.contains('hidden')) {
                    const welCard = document.createElement('div');
                    welCard.innerHTML = `
                        <div class="post-card" style="border-right: 4px solid var(--primary-color); background: #0b0d10;">
                            <img src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png" class="post-avatar">
                            <div class="post-main">
                                <div style="font-size:12px; color:var(--primary-color); font-weight:bold; margin-bottom:2px;">📌 تفتيتة مثبتة من المطور</div>
                                <div class="post-header">
                                    <span class="post-username">فارس الشمري</span>
                                    <span class="post-handle">@developer</span>
                                </div>
                                <div class="post-text">السلام عليكم بعد شهر. والحمدلله فتحت موقعي وباذن الله يصير تطبيقي على جميع المتاجر واتمنى انه يعجبكم وإذا في أي مشكلة أو اقتراح تقدر تتواصل معنا على البريد الإلكتروني (faris777alshamri@gmail.com) وشكرا لكم.</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(welCard);
                }

                let followingList = [];
                const folSnap = await db.collection('users').doc(currentUser.uid).collection('following').get();
                folSnap.forEach(d => followingList.push(d.id));

                let postIndex = 0;

                snapshot.forEach(doc => {
                    const post = doc.data();
                    const pId = doc.id;
                    
                    if(!document.getElementById('feed-page').classList.contains('hidden') && currentFeedTab === 'following' && !followingList.includes(post.userId) && post.userId !== currentUser.uid) {
                        return; 
                    }

                    let mediaHtml = "";
                    if (post.fileUrl) {
                        if (post.fileType === "video") {
                            mediaHtml = `<video src="${post.fileUrl}" class="post-media" controls playsinline onclick="openFullscreen('${post.fileUrl}', 'video')"></video>`;
                        } else {
                            mediaHtml = `<img src="${post.fileUrl}" class="post-media" onclick="openFullscreen('${post.fileUrl}', 'image')">`;
                        }
                    }

                    const isLiked = post.likedBy && post.likedBy.includes(currentUser.uid);
                    const postDateText = formatPostDate(post.createdAt);
                    const canDelete = (post.userId === currentUser.uid);

                    const cardHtml = `
                        <div class="post-card" id="card-el-${pId}">
                            <img src="${post.userAvatar || 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png'}" class="post-avatar" onclick="viewUserProfile('${post.userId}')">
                            <div class="post-main">
                                <div class="post-header">
                                    <div class="post-meta-info">
                                        <span class="post-username" onclick="viewUserProfile('${post.userId}')">${post.userName}</span>
                                        <span class="post-handle">@${post.userHandle}</span>
                                        <span style="color:var(--text-muted);">•</span>
                                        <span class="post-date">${postDateText}</span>
                                    </div>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        ${canDelete ? `<button class="delete-btn" onclick="deletePost('${pId}')" title="حذف">🗑️</button>` : ''}
                                        ${post.userId !== currentUser.uid ? `<button class="btn id-folbtn-${post.userId}" style="padding:3px 10px; font-size:12px; background-color:${followingList.includes(post.userId) ? '#2f3336' : 'var(--primary-color)'};" onclick="toggleFollowUser('${post.userId}')">${followingList.includes(post.userId) ? 'إلغاء المتابعة':'تابعني'}</button>` : ''}
                                    </div>
                                </div>
                                <div class="post-text">${post.text}</div>
                                ${mediaHtml}
                                <div class="post-actions">
                                    <button class="action-btn" style="color: ${isLiked ? '#f4212e':'var(--text-muted)'}" onclick="toggleLikePost('${pId}')">❤️ ${post.likes || 0}</button>
                                    <button class="action-btn" onclick="toggleCommentsSection('${pId}')">💬 ردود</button>
                                    <button class="action-btn" onclick="goToDirectChat('${post.userId}', '${post.userName}')">✉️ خاص</button>
                                </div>
                                <div id="comments-box-${pId}" class="comments-section hidden">
                                    <div style="display:flex; gap:5px; margin-bottom:8px;">
                                        <input type="text" id="comment-input-${pId}" class="auth-input" placeholder="اكتب ردك هنا..." style="margin:0; padding:6px;">
                                        <button class="btn" style="padding:6px 15px;" onclick="addCommentToPost('${pId}')">رد</button>
                                    </div>
                                    <div id="comments-list-${pId}" style="display:flex; flex-direction:column; gap:4px; font-size:13px; color:var(--text-muted);"></div>
                                </div>
                            </div>
                        </div>
                    `;

                    if(!document.getElementById('feed-page').classList.contains('hidden')) {
                        const divFeed = document.createElement('div');
                        divFeed.innerHTML = cardHtml;
                        container.appendChild(divFeed);
                        postIndex++;

                        // 💰 حقن الإعلان المدمج كل 3 تفتيتات بنظام الـ Iframe الذكي والآمن
                        if (postIndex % 3 === 0) {
                            const adDivId = `ad-holder-${pId}-${postIndex}`;
                            const adCard = document.createElement('div');
                            adCard.className = "ad-native-card";
                            adCard.innerHTML = `
                                <div class="ad-header-area">
                                    <div style="display:flex; align-items:center; gap:10px;">
                                        <img src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png" class="post-avatar">
                                        <strong style="color:var(--text-muted); font-size:14px;">محتوى مدعوم</strong>
                                    </div>
                                    <span class="ad-badge">إعلان 💲</span>
                                </div>
                                <div class="native-ad-wrapper" id="${adDivId}"></div>
                            `;
                            container.appendChild(adCard);
                            injectNativeAdIntoElement(adDivId);
                        }
                    }

                    if(viewedUid && post.userId === viewedUid) {
                        if(currentProfileTab === 'posts') {
                            const divP = document.createElement('div'); divP.innerHTML = cardHtml; profileContainer.appendChild(divP);
                        } else if(currentProfileTab === 'media' && post.fileUrl) {
                            const divP = document.createElement('div'); divP.innerHTML = cardHtml; profileContainer.appendChild(divP);
                        }
                    }
                    if(currentProfileTab === 'likes' && post.likedBy && post.likedBy.includes(viewedUid)) {
                        const divP = document.createElement('div'); divP.innerHTML = cardHtml; profileContainer.appendChild(divP);
                    }
                });
            });
        }

        // تعديل دالة الحذف لحذف فوري وتحديث فوري للتايم لاين
        async function deletePost(postId) {
            if(!confirm("هل تريد حذف هذه التفتيتة نهائياً؟")) return;
            try { 
                await db.collection('posts').doc(postId).delete(); 
                const el = document.getElementById(`card-el-${postId}`);
                if(el) el.remove(); 
            } catch (error) { alert("فشل الحذف: " + error.message); }
        }

        async function toggleLikePost(id) {
            const ref = db.collection('posts').doc(id);
            const snap = await ref.get();
            if(!snap.exists) return;
            let pData = snap.data();
            let likedBy = pData.likedBy || [];
            let likes = pData.likes || 0;

            if(likedBy.includes(currentUser.uid)) {
                likedBy = likedBy.filter(u => u !== currentUser.uid);
                likes = Math.max(0, likes - 1);
            } else {
                likedBy.push(currentUser.uid);
                likes += 1;
                const uSnap = await db.collection('users').doc(currentUser.uid).get();
                addNotification(pData.userId, 'like', `أعجب ${uSnap.data()?.name || 'مستخدم'} بتفتيتتك.`);
            }
            await ref.update({ likes: likes, likedBy: likedBy });
        }

        async function toggleFollowUser(targetUid) {
            if(targetUid === currentUser.uid) return;
            const myFollowRef = db.collection('users').doc(currentUser.uid).collection('following').doc(targetUid);
            const targetFollowerRef = db.collection('users').doc(targetUid).collection('followers').doc(currentUser.uid);
            const doc = await myFollowRef.get();
            const uSnap = await db.collection('users').doc(currentUser.uid).get();

            if(doc.exists) {
                await myFollowRef.delete();
                await targetFollowerRef.delete();
            } else {
                await myFollowRef.set({});
                await targetFollowerRef.set({});
                addNotification(targetUid, 'follow', `بدأ ${uSnap.data()?.name || 'مستخدم'} في متابعتك.`);
            }
            if(viewedUid) viewUserProfile(viewedUid);
        }

        function toggleCommentsSection(id) {
            const el = document.getElementById(`comments-box-${id}`);
            el.classList.toggle('hidden');
            if(!el.classList.contains('hidden')) loadCommentsForPost(id);
        }

        async function addCommentToPost(id) {
            const input = document.getElementById(`comment-input-${id}`);
            if(!input.value) return;
            const uSnap = await db.collection('users').doc(currentUser.uid).get();
            await db.collection('posts').doc(id).collection('comments').add({
                text: input.value,
                userName: uSnap.data()?.name || currentUser.email.split('@')[0],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
            loadCommentsForPost(id);
        }

        function loadCommentsForPost(id) {
            db.collection('posts').doc(id).collection('comments').orderBy('createdAt', 'asc').get().then(snap => {
                const list = document.getElementById(`comments-list-${id}`);
                list.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<p style="margin:2px 0; color:#fff;"><strong>${c.userName}:</strong> ${c.text}</p>`;
                });
            });
        }

        async function viewUserProfile(uid) {
            if(!uid) uid = currentUser.uid;
            viewedUid = uid;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('profile-page').classList.remove('hidden');
            
            if(uid === currentUser.uid) {
                document.getElementById('edit-profile-section').classList.remove('hidden');
                document.getElementById('profile-action-btn').classList.add('hidden');
            } else {
                document.getElementById('edit-profile-section').classList.add('hidden');
                const btn = document.getElementById('profile-action-btn');
                btn.classList.remove('hidden');
                const folSnap = await db.collection('users').doc(currentUser.uid).collection('following').doc(uid).get();
                btn.innerText = folSnap.exists ? "إلغاء المتابعة" : "متابعة الحساب";
                btn.style.backgroundColor = folSnap.exists ? "#2f3336" : "var(--primary-color)";
            }

            db.collection('users').doc(uid).get().then(async doc => {
                const uData = doc.data() || {};
                updateProfileUI(uData);
                const f1 = await db.collection('users').doc(uid).collection('following').get();
                const f2 = await db.collection('users').doc(uid).collection('followers').get();
                document.getElementById('cnt-following').innerText = f1.size;
                document.getElementById('cnt-followers').innerText = f2.size;
                document.getElementById('stat-link-following').onclick = () => openUsersListModal('following', uid);
                document.getElementById('stat-link-followers').onclick = () => openUsersListModal('followers', uid);
            });
            loadTimeline();
        }

        async function handleProfileFollowToggle() {
            if(viewedUid) { await toggleFollowUser(viewedUid); viewUserProfile(viewedUid); }
        }

        async function openUsersListModal(type, uid) {
            const titleEl = document.getElementById('users-modal-title');
            const listEl = document.getElementById('users-modal-list');
            listEl.innerHTML = "جاري جلب الأعضاء...";
            document.getElementById('users-modal-overlay').classList.remove('hidden');
            titleEl.innerText = type === 'following' ? "قائمة المُتابَعين" : "قائمة المتابِعون";

            const snap = await db.collection('users').doc(uid).collection(type).get();
            if(snap.empty) {
                listEl.innerHTML = "<p style='color:var(--text-muted); text-align:center;'>القائمة فارغة حالياً</p>";
                return;
            }

            listEl.innerHTML = "";
            snap.forEach(async doc => {
                const uSnap = await db.collection('users').doc(doc.id).get();
                const uData = uSnap.data() || {};
                const name = uData.name || "عضو في فت";
                const handle = uData.handle || "user";
                const avatar = uData.avatar || "https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png";

                const row = document.createElement('div');
                row.style = "display:flex; align-items:center; gap:10px; margin-bottom:12px; background:#16181c; padding:8px; border-radius:8px; cursor:pointer;";
                row.innerHTML = `
                    <img src="${avatar}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                    <div>
                        <div style="font-weight:bold; font-size:14px; color:#fff;">${name}</div>
                        <div style="color:var(--text-muted); font-size:12px;">@${handle}</div>
                    </div>
                `;
                row.onclick = () => { closeUsersModal(); viewUserProfile(doc.id); };
                listEl.appendChild(row);
            });
        }
        function closeUsersModal() { document.getElementById('users-modal-overlay').classList.add('hidden'); }

        function addNotification(targetUid, type, text) {
            if(targetUid === currentUser.uid) return;
            db.collection('users').doc(targetUid).collection('notifications').add({
                type: type, text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp(), read: false
            });
        }

        function loadNotifications() {
            db.collection('users').doc(auth.currentUser.uid).collection('notifications').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const container = document.getElementById('notifications-container');
                container.innerHTML = "";
                if(snap.empty) {
                    container.innerHTML = "<p style='color:var(--text-muted); text-align:center; padding:20px;'>لا توجد إشعارات جديدة حالياً.</p>";
                    return;
                }
                snap.forEach(doc => {
                    const n = doc.data();
                    container.innerHTML += `
                        <div class="notif-item ${!n.read ? 'notif-unread':''}">
                            <div style="font-size:20px;">${n.type==='like'?'❤️':'👤'}</div>
                            <div><div style="color:#fff; font-size:14px;">${n.text}</div></div>
                        </div>
                    `;
                    if(!n.read) { db.collection('users').doc(currentUser.uid).collection('notifications').doc(doc.id).update({read:true}); }
                });
            });
        }

        function goToDirectChat(uid, name) {
            if(uid === currentUser.uid) return alert("لا يمكنك مراسلة نفسك!");
            const msgBtn = document.getElementById('nav-btn-messages');
            navigate('messages-page', msgBtn);
            startChat(uid, name);
        }

        function switchFeedTab(tab) {
            currentFeedTab = tab;
            document.getElementById('tab-for-you').classList.toggle('active', tab === 'all');
            document.getElementById('tab-following').classList.toggle('active', tab === 'following');
            loadTimeline();
        }
        function switchProfileTab(tab) {
            currentProfileTab = tab;
            document.getElementById('ptab-posts').classList.toggle('active', tab === 'posts');
            document.getElementById('ptab-media').classList.toggle('active', tab === 'media');
            document.getElementById('ptab-likes').classList.toggle('active', tab === 'likes');
            loadTimeline();
        }

        function loadChatUsersList() {
            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('chat-users-container');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    if(u.uid !== currentUser.uid) {
                        list.innerHTML += `
                            <div style="display:flex; align-items:center; justify-content:space-between; padding:15px; border-bottom:1px solid var(--border-color); cursor:pointer;" onclick="startChat('${u.uid}','${u.name}')">
                                <div style="display:flex; gap:10px; align-items:center;">
                                    <img src="${u.avatar}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                    <strong style="color:#fff;">${u.name}</strong>
                                </div>
                                <span style="font-size:12px; color:var(--text-muted);">@${u.handle}</span>
                            </div>
                        `;
                    }
                });
            });
        }

        function startChat(uid, name) {
            selectedChatUid = uid;
            document.getElementById('chat-users-container').classList.add('hidden');
            document.getElementById('active-chat-box').classList.remove('hidden');
            
            const cId = currentUser.uid < uid ? `${currentUser.uid}_${uid}` : `${uid}_${currentUser.uid}`;
            db.collection('chats').doc(cId).collection('messages').orderBy('createdAt','asc').onSnapshot(snap => {
                const box = document.getElementById('chat-messages-list');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const side = m.senderId === currentUser.uid ? 'background:#1da1f2; align-self:flex-start;' : 'background:#2f3336; align-self:flex-end;';
                    box.innerHTML += `<div style="padding:8px 12px; border-radius:12px; max-width:70%; color:white; ${side}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
        function exitChat() {
            document.getElementById('chat-users-container').classList.remove('hidden');
            document.getElementById('active-chat-box').classList.add('hidden');
        }
        async function sendDirectMessage() {
            const txt = document.getElementById('chat-msg-input').value;
            if(!txt || !selectedChatUid) return;
            const cId = currentUser.uid < selectedChatUid ? `${currentUser.uid}_${selectedChatUid}` : `${selectedChatUid}_${currentUser.uid}`;
            await db.collection('chats').doc(cId).collection('messages').add({
                text: txt, senderId: currentUser.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('chat-msg-input').value = "";
        }

        function navigate(pageId, btnElement) {
            viewedUid = null;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.remove('hidden');
            btnElement.classList.add('active');
            if(pageId === 'feed-page') loadTimeline();
        }

        document.getElementById('search-input').addEventListener('input', async (e) => {
            const q = e.target.value.toLowerCase();
            const res = document.getElementById('search-results');
            if(!q) { res.innerHTML = ""; return; }
            const snap = await db.collection('posts').get();
            res.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                if(p.text.toLowerCase().includes(q)) {
                    res.innerHTML += `<div class="post-card"><div class="post-main"><strong style="color:#fff;">${p.userName}</strong><p>${p.text}</p></div></div>`;
                }
            });
        });

        function logOut() { auth.signOut(); }
    </script>
</body>
</html>
