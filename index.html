<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اينتس - Aintz</title>
    <style>
        /* التأسيس العام للمنصة */
        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --primary-color: #1d9bf0;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 90px;
            transition: all 0.2s ease;
        }

        /* شاشة تسجيل الدخول الإجبارية مع دعم الصورة واللغة */
        #authOverlayScreen {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #ffffff; z-index: 99999; display: flex; 
            align-items: center; justify-content: center; padding: 20px;
            overflow-y: auto;
        }
        .auth-container {
            width: 100%; max-width: 450px; background: #fff; 
            padding: 30px; border-radius: 16px; border: 1px solid #e5e7eb;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }
        .auth-logo-img {
            display: block; width: 80px; height: 80px; margin: 0 auto 10px;
            object-fit: cover; border-radius: 16px;
        }
        .auth-logo { text-align: center; font-size: 26px; font-weight: 800; color: #1d9bf0; margin-bottom: 20px; }
        
        .auth-lang-switcher {
            position: absolute; top: 15px; left: 15px;
        }
        body.lang-en .auth-lang-switcher { left: auto; right: 15px; }
        .auth-lang-switcher select {
            padding: 4px 8px; border-radius: 8px; border: 1px solid #e5e7eb; font-size: 12px; cursor: pointer;
        }

        .auth-tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 20px; }
        .auth-tab { flex:1; text-align:center; padding: 10px; cursor:pointer; font-weight:bold; color:#6b7280; }
        .auth-tab.active { color: #1d9bf0; border-bottom: 2px solid #1d9bf0; margin-bottom: -2px; }

        /* بار التحكم العلوي مع صورة التطبيق فوق يسار */
        .top-navigation-bar {
            max-width: 600px; margin: 12px auto 0; padding: 0 16px;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .nav-buttons-group { display: flex; gap: 8px; }
        .nav-profile-trigger, .nav-settings-trigger {
            padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; 
            cursor: pointer; background: #fff; border: 1px solid #e5e7eb; color: #4b5563;
            display: flex; align-items: center; gap: 6px;
        }
        .app-top-left-logo {
            width: 38px; height: 38px; border-radius: 8px; object-fit: cover;
            border: 1px solid #e5e7eb;
        }

        /* شريط تابات الأزمنة */
        .universal-header {
            max-width: 600px; margin: 12px auto; display: flex; gap: 8px; padding: 0 16px;
        }
        .time-switching-tab {
            flex: 1; text-align: center; padding: 12px 8px; font-size: 14px; font-weight: bold; 
            cursor: pointer; border-radius: 20px; background: #e5e7eb; color: #4b5563;
            display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .time-switching-tab.active-tab {
            background: #1d9bf0 !important; color: #ffffff !important; box-shadow: 0 4px 12px rgba(29, 155, 240, 0.2);
        }

        /* التايملاين الرئيسي */
        .feed-layout-wrapper {
            max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; padding: 0 16px;
        }
        .timeline-view { display: none; flex-direction: column; gap: 14px; }
        .timeline-view.active-view { display: flex; }

        /* كروت الحاضر */
        .publisher-zone, .post-feed-card, .profile-configuration-card {
            background: var(--card-bg); border-radius: 16px; padding: 16px; border: 1px solid var(--border-color);
        }
        textarea { 
            width: 100%; height: 80px; background: transparent; border: none; color: inherit; 
            font-size: 15px; outline: none; resize: none; font-family: inherit; text-align: inherit;
        }
        .card-top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .avatar-frame { width: 44px; height: 44px; border-radius: 50%; background: #e5e7eb; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .user-title-text { font-size: 14px; font-weight: bold; }
        .user-handle-text { font-size: 12px; color: #6b7280; direction: ltr; display: inline-block; margin-inline-start: 4px; }
        .user-subtitle-stats { font-size: 11px; color: #9ca3af; margin-top: 2px; }
        .post-content { font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; text-align: justify; }
        .divider-line { display: none; }

        .publish-trigger-btn { background: #1d9bf0; color: #fff; border: none; padding: 8px 20px; border-radius: 24px; font-weight: bold; cursor: pointer; }
        .file-selector-btn { background: #f3f4f6; color: #4b5563; padding: 8px 16px; font-size: 13px; border-radius: 24px; cursor: pointer; }

        /* إدارة التفاعل والحذف */
        .actions-footer-container { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
        .like-btn-node { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #6b7280; font-size: 13px; }
        .like-btn-node svg { width: 18px; height: 18px; fill: none; stroke: #6b7280; stroke-width: 2; }
        .like-btn-node.activated svg { fill: #ef4444; stroke: #ef4444; }
        .like-btn-node.activated { color: #ef4444; }
        
        .delete-post-btn { background: none; border: none; color: #ef4444; font-size: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; }

        /* الردود والتعليقات */
        .comments-block-area { background: #f9fafb; padding: 10px; margin-top: 12px; border-radius: 12px; }
        .single-comment-node { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f3f4f6; color: #4b5563; }
        .comment-box-flex { display: flex; gap: 8px; margin-top: 10px; }
        .comment-box-flex input { flex: 1; padding: 8px 14px; border: 1px solid #e5e7eb; font-size: 13px; outline: none; border-radius: 20px; }
        .comment-post-btn { background: #1d9bf0; color: #fff; border: none; padding: 6px 14px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 20px; }

        /* الروابط وأزرار قوقل وأبل المتطورة */
        .oauth-providers-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .oauth-btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #e5e7eb; background: #fff; }
        .oauth-btn.google { color: #4285F4; }
        .oauth-btn.apple { color: #000000; background: #f9fafb; }
        .oauth-btn.linked { background: #e0f2fe; border-color: #7dd3fc; }

        /* حقول الإدخال القياسية والنموذجية */
        .form-input-row { text-align: right; margin-bottom: 14px; }
        .form-input-row label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; }
        .form-input-row input { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #e5e7eb; border-radius: 8px; outline: none; }
        
        .commit-and-close-btn { background: #1d9bf0; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 24px; margin-top: 10px; }

        /* قوالب وتنسيقات الـ المنتدى (الزمن القديم الكلاسيكي) */
        body.mode-past { background-color: #e1e7f0; }
        body.mode-past .nav-profile-trigger, body.mode-past .nav-settings-trigger { background: #2563eb; color: #fff; border-radius: 4px; border: 1px solid #1d4ed8; }
        body.mode-past .universal-header { border: 2px solid #2563eb; background: #fff; border-radius: 0; gap: 0; padding: 0; }
        body.mode-past .time-switching-tab { border-radius: 0; background: #fff; color: #2563eb; }
        body.mode-past .time-switching-tab.active-tab { background: #f59e0b !important; color: #000 !important; }
        
        body.mode-past .publisher-zone, body.mode-past .post-feed-card, body.mode-past .profile-configuration-card { background: #fff; border: 2px solid #2563eb; border-radius: 0; }
        body.mode-past textarea { background: #fff; border: 1px solid #cbd5e1; border-radius: 0; }
        body.mode-past .card-top-header { background: #eff6ff; padding: 10px; border-bottom: 1px solid #bfdbfe; border-radius: 0; }
        body.mode-past .avatar-frame { border-radius: 0; border: 1px solid #cbd5e1; }
        body.mode-past .divider-line { border-top: 1px dotted #2563eb; margin: 10px 0; display: block; }
        body.mode-past .publish-trigger-btn { background: #1e3a8a; border-radius: 0; }
        body.mode-past .file-selector-btn { background: #e2e8f0; border-radius: 0; border: 1px solid #cbd5e1; }
        
        body.mode-past .like-btn-node { background: #f59e0b; color: #000; border: 1px solid #d97706; padding: 6px 14px; border-radius: 0; }
        body.mode-past .like-btn-node svg { display: none; }
        body.mode-past .like-btn-node::before { content: "إعجاب "; }
        body.mode-past .delete-post-btn { background: #ef4444; color: #fff; padding: 4px 10px; border-radius: 0; }

        body.mode-past .comments-block-area { background: #fff; border: 1px dashed #2563eb; border-radius: 0; }
        body.mode-past .comment-box-flex input { background: #fff; border: 1px solid #cbd5e1; border-radius: 0; }
        body.mode-past .comment-post-btn { background: #2563eb; border-radius: 0; }
        body.mode-past .form-input-row input { border-radius: 0; border: 1px solid #2563eb; }
        body.mode-past .commit-and-close-btn { background: #1e3a8a; border-radius: 0; }

        /* الصفحات الفرعية المنفصلة */
        .isolated-sub-page { display: none; max-width: 600px; margin: 20px auto; padding: 0 16px; }

        /* ستايل لترجمة الانجليزي المباشر */
        body.lang-en { dir: ltr !important; text-align: left !important; }
        body.lang-en .form-input-row { text-align: left !important; }
        body.lang-en .form-input-row label { text-align: left !important; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div id="authOverlayScreen">
        <div class="auth-container">
            <div class="auth-lang-switcher">
                <select id="authLanguageSelect" onchange="changeAppLanguage(this.value)">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>

            <img src="https://i.ibb.co/jkNnhyFL/image.png" class="auth-logo-img" alt="Aintz Logo" onerror="this.src='https://i.ibb.co/rtgYtT7/image-7.png'">
            <div class="auth-logo" id="authLogoText">اينتس</div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="toggleAuthMode('login')">تسجيل الدخول</div>
                <div class="auth-tab" id="tabRegister" onclick="toggleAuthMode('register')">إنشاء حساب جديد</div>
            </div>
            
            <form id="authMainForm" onsubmit="handleAuthSubmit(event)">
                <div class="form-input-row" id="authNameRow" style="display: none;">
                    <label id="lblAuthName">الاسم الكامل (اسم العرض):</label>
                    <input type="text" id="authNameInput" value="مستكشف الأزمنة">
                </div>
                <div class="form-input-row" id="authUsernameRow" style="display: none;">
                    <label id="lblAuthUser">اسم المستخدم (اليوزر @):</label>
                    <input type="text" id="authUsernameInput" value="@traveler">
                </div>
                <div class="form-input-row">
                    <label id="lblAuthEmail">البريد الإلكتروني:</label>
                    <input type="email" id="authEmailInput" required placeholder="user@domain.com">
                </div>
                <div class="form-input-row">
                    <label id="lblAuthPass">كلمة المرور:</label>
                    <input type="password" id="authPasswordInput" required placeholder="••••••••">
                </div>

                <button type="submit" class="commit-and-close-btn" id="authSubmitBtn">تسجيل الدخول</button>
            </form>

            <div class="oauth-providers-group">
                <button class="oauth-btn google" id="btnOauthGoogle" onclick="handleFirebaseOAuth('Google')">
                    <span>الربط السريع عبر سحابة Google</span>
                </button>
                <button class="oauth-btn apple" id="btnOauthApple" onclick="handleFirebaseOAuth('Apple')">
                    <span>الربط السريع عبر معرف Apple ID</span>
                </button>
            </div>
        </div>
    </div>


    <div class="top-navigation-bar" id="appTopBar">
        <div class="nav-buttons-group">
            <button class="nav-profile-trigger" onclick="switchPage('profile')">
                <span>لوحة تحكم العضو</span>
            </button>
            <button class="nav-settings-trigger" onclick="switchPage('settings')">
                <span>⚙️ الإعدادات</span>
            </button>
        </div>
        <img src="https://i.ibb.co/jkNnhyFL/image.png" class="app-top-left-logo" alt="Aintz Mini Logo" onerror="this.src='https://i.ibb.co/rtgYtT7/image-7.png'">
    </div>

    <header class="universal-header" id="appTimelineHeader">
        <div class="time-switching-tab active-tab" id="presentStyleTab" onclick="modifyActiveTimeline('present')">
            <span>المنصة الحالية</span>
        </div>
        <div class="time-switching-tab" id="pastStyleTab" onclick="modifyActiveTimeline('past')">
            <span>الالتحاق بالمنتدى القديم</span>
        </div>
    </header>

    <main class="feed-layout-wrapper" id="appTimelineMainFeed">
        
        <div class="publisher-zone">
            <form id="dynamicPostForm">
                <textarea id="mainEditorArea" placeholder="وش قاعد يصير في تفكيرك الآن?" required></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px;">
                    <button type="submit" class="publish-trigger-btn" id="publishBtnText">نشر التغريدة</button>
                    <label for="mediaAttachmentInput" class="file-selector-btn" id="fileBtnText">إرفاق صورة</label>
                    <input type="file" id="mediaAttachmentInput" accept="image/*" style="display: none;">
                </div>
            </form>
        </div>

        <div id="presentTimelineView" class="timeline-view active-view"></div>
        <div id="pastTimelineView" class="timeline-view"></div>

    </main>


    <div class="isolated-sub-page" id="appProfileSecondPage">
        <div class="profile-configuration-card">
            <div class="form-input-row">
                <label id="lblProfileDisplay">اسم العرض الظاهر:</label>
                <input type="text" id="fieldProfileDisplayName" value="مستكشف الأزمنة">
            </div>
            <div class="form-input-row">
                <label id="lblProfileHandle">اسم المستخدم (اليوزر @):</label>
                <input type="text" id="fieldProfileHandle" value="@traveler">
            </div>
            <button class="commit-and-close-btn" id="profileSaveBtnText" onclick="saveAndExitProfile()">حفظ والعودة للرئيسية</button>
        </div>
    </div>


    <div class="isolated-sub-page" id="appSettingsPage">
        <div class="profile-configuration-card">
            <h2 style="margin-bottom: 20px;" id="settingTitle">إعدادات المنصة المتقدمة</h2>
            
            <div class="form-input-row">
                <label id="lblSettingLang">لغة الواجهة الحالية (Language):</label>
                <select id="settingLanguageSelect" onchange="changeAppLanguage(this.value)" style="width:100%; padding:10px; border-radius:8px; border:1px solid #e5e7eb;">
                    <option value="ar">العربية (Arabic)</option>
                    <option value="en">English (Aintz)</option>
                </select>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e5e7eb;">

            <div class="form-input-row">
                <label id="lblSettingEmail">تغيير البريد الإلكتروني (Email):</label>
                <input type="email" id="settingEmailField" value="user@domain.com">
            </div>
            <div class="form-input-row">
                <label id="lblSettingPass">تغيير كلمة المرور (Password):</label>
                <input type="password" id="settingPasswordField" value="password123">
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e5e7eb;">

            <div class="form-input-row">
                <label id="lblSettingOauth">حالة ربط الحسابات الخارجية:</label>
                <div class="oauth-providers-group">
                    <button class="oauth-btn google" id="btnLinkGoogle" onclick="togglePlatformLink('Google')">ربط وتوثيق بحساب Google</button>
                    <button class="oauth-btn apple" id="btnLinkApple" onclick="togglePlatformLink('Apple')">ربط وتوثيق بحساب Apple</button>
                </div>
            </div>

            <button class="commit-and-close-btn" style="background:#4b5563;" onclick="switchPage('feed')" id="btnSettingsBack">العودة للتايملاين</button>
        </div>
    </div>


    <script>
        // ==========================================================================
        // إعدادات الـ Firebase الخاصة بك
        // استبدل الكائن أدناه ببيانات مشروعك الحقيقية من لوحة تحكم Firebase Console
        // ==========================================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // بدء تهيئة Firebase
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
        }

        let currentTimelineState = "present"; 
        let currentAuthMode = "login";
        let currentLanguage = "ar";

        let userAccountData = {
            display: "مستكشف الأزمنة",
            username: "@traveler",
            email: "user@domain.com",
            password: "password123",
            googleLinked: false,
            appleLinked: false
        };

        const dictionary = {
            ar: {
                authLogo: "اينتس", login: "تسجيل الدخول", register: "إنشاء حساب جديد", entry: "تسجيل الدخول",
                name: "الاسم الكامل (اسم العرض):", user: "اسم المستخدم (اليوزر @):", email: "البريد الإلكتروني:", pass: "كلمة المرور:",
                writeText: "وش قاعد يصير في تفكيرك الآن؟", btnTweet: "نشر التغريدة", btnTopic: "إضافة موضوع جديد",
                imgBtn: "إرفاق صورة", controlBtn: "لوحة تحكم العضو", settingsBtn: "⚙️ الإعدادات",
                currentStyle: "المنصة الحالية", oldStyle: "الالتحاق بالمنتدى القديم", deleteText: "🗑️ حذف التغريدة",
                replyPlaceholder: "اكتب ردك هنا...", replyBtn: "رد", replyPlaceholderPast: "إضافة رد سريع على الموضوع...", replyBtnPast: "إضافة رد",
                oauthGoogle: "الربط السريع عبر سحابة Google", oauthApple: "الربط السريع عبر معرف Apple ID",
                settingTitle: "إعدادات المنصة المتقدمة", settingLang: "لغة الواجهة الحالية (Language):", settingEmail: "تغيير البريد الإلكتروني (Email):", settingPass: "تغيير كلمة المرور (Password):",
                settingOauth: "حالة ربط الحسابات الخارجية:", settingBack: "العودة للتايملاين"
            },
            en: {
                authLogo: "Aintz", login: "Login", register: "Register New Account", entry: "Sign In",
                name: "Full Display Name:", user: "Username (Handle @):", email: "Email Address:", pass: "Password:",
                writeText: "What is happening in your mind now?", btnTweet: "Post Tweet", btnTopic: "Post New Topic",
                imgBtn: "Attach Image", controlBtn: "User Control Panel", settingsBtn: "⚙️ Settings",
                currentStyle: "Modern Feed", oldStyle: "Classic Forum", deleteText: "🗑️ Delete Post",
                replyPlaceholder: "Write your reply here...", replyBtn: "Reply", replyPlaceholderPast: "Add quick reply to topic...", replyBtnPast: "Submit Reply",
                oauthGoogle: "Quick Connect via Google Cloud", oauthApple: "Quick Connect via Apple ID",
                settingTitle: "Advanced Platform Settings", settingLang: "Interface Language:", settingEmail: "Change Email Address:", settingPass: "Change Password:",
                settingOauth: "External Accounts Link Status:", settingBack: "Back to Timeline"
            }
        };

        function toggleAuthMode(mode) {
            currentAuthMode = mode;
            document.getElementById('tabLogin').className = mode === 'login' ? 'auth-tab active' : 'auth-tab';
            document.getElementById('tabRegister').className = mode === 'register' ? 'auth-tab active' : 'auth-tab';
            
            document.getElementById('authNameRow').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('authUsernameRow').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('authSubmitBtn').innerText = mode === 'login' ? (currentLanguage === 'ar' ? "تسجيل الدخول" : "Sign In") : (currentLanguage === 'ar' ? "إنشاء الحساب والدخول فوراً" : "Register & Login Now");
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            if(currentAuthMode === 'register') {
                userAccountData.display = document.getElementById('authNameInput').value;
                let userVal = document.getElementById('authUsernameInput').value;
                userAccountData.username = userVal.startsWith('@') ? userVal : '@' + userVal;
            }
            userAccountData.email = document.getElementById('authEmailInput').value;
            userAccountData.password = document.getElementById('authPasswordInput').value;

            document.getElementById('fieldProfileDisplayName').value = userAccountData.display;
            document.getElementById('fieldProfileHandle').value = userAccountData.username;
            document.getElementById('settingEmailField').value = userAccountData.email;
            document.getElementById('settingPasswordField').value = userAccountData.password;

            document.getElementById('authOverlayScreen').style.display = 'none';
            injectDefaultPosts();
        }

        // دالة الـ OAuth الحقيقية المربوطة بالفيربيس ومضاف لها كود إجبار اختيار الحساب
        function handleFirebaseOAuth(platform) {
            if (firebaseConfig.apiKey === "YOUR_API_KEY") {
                // محاكاة عمل واجهة المستخدم إذا لم يتم وضع مفاتيح API الحقيقية بعد
                alert(`[وضع المعاينة]: سيتم تشغيل نافذة اختيار حساب ${platform} الحقيقية بمجرد ربط الـ API Key الخاص بك في الكود.`);
                document.getElementById('authOverlayScreen').style.display = 'none';
                injectDefaultPosts();
                return;
            }

            let provider;
            if (platform === 'Google') {
                provider = new firebase.auth.GoogleAuthProvider();
                // إجبار قوقل على إظهار نافذة اختيار الحساب دائماً وعدم الدخول التلقائي
                provider.setCustomParameters({ prompt: 'select_account' });
            } else if (platform === 'Apple') {
                provider = new firebase.auth.OAuthProvider('apple.com');
                provider.addScope('email');
                provider.addScope('name');
            }

            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    userAccountData.display = user.displayName || "مستخدم متصل";
                    userAccountData.email = user.email;
                    userAccountData.username = "@" + (user.email.split('@')[0]);

                    document.getElementById('fieldProfileDisplayName').value = userAccountData.display;
                    document.getElementById('fieldProfileHandle').value = userAccountData.username;

                    document.getElementById('authOverlayScreen').style.display = 'none';
                    injectDefaultPosts();
                    alert(`أهلاً بك! تم تسجيل الدخول بنجاح عبر حسابك في ${platform}`);
                })
                .catch((error) => {
                    console.error("خطأ أثناء تسجيل الدخول: ", error);
                    alert("حدث خطأ أثناء الاتصال: " + error.message);
                });
        }

        function togglePlatformLink(platform) {
            if(platform === 'Google') {
                userAccountData.googleLinked = !userAccountData.googleLinked;
                const btn = document.getElementById('btnLinkGoogle');
                btn.className = userAccountData.googleLinked ? "oauth-btn linked" : "oauth-btn google";
                btn.innerText = userAccountData.googleLinked ? "✅ متصل بحساب Google بنجاح" : "ربط وتوثيق بحساب Google";
            } else {
                userAccountData.appleLinked = !userAccountData.appleLinked;
                const btn = document.getElementById('btnLinkApple');
                btn.className = userAccountData.appleLinked ? "oauth-btn linked" : "oauth-btn apple";
                btn.innerText = userAccountData.appleLinked ? "✅ متصل بحساب Apple ID بنجاح" : "ربط وتوثيق بحساب Apple";
            }
        }

        function changeAppLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('authLanguageSelect').value = lang;
            document.getElementById('settingLanguageSelect').value = lang;

            if(lang === 'en') {
                document.body.classList.add('lang-en');
                document.documentElement.dir = "ltr";
            } else {
                document.body.classList.remove('lang-en');
                document.documentElement.dir = "rtl";
            }
            
            const d = dictionary[lang];
            document.getElementById('authLogoText').innerText = d.authLogo;
            document.getElementById('tabLogin').innerText = d.login;
            document.getElementById('tabRegister').innerText = d.register;
            
            document.getElementById('lblAuthName').innerText = d.name;
            document.getElementById('lblAuthUser').innerText = d.user;
            document.getElementById('lblAuthEmail').innerText = d.email;
            document.getElementById('lblAuthPass').innerText = d.pass;
            
            document.querySelector('#btnOauthGoogle span').innerText = d.oauthGoogle;
            document.querySelector('#btnOauthApple span').innerText = d.oauthApple;
            
            document.getElementById('mainEditorArea').placeholder = d.writeText;
            document.getElementById('fileBtnText').innerText = d.imgBtn;
            document.querySelector('.nav-profile-trigger span').innerText = d.controlBtn;
            document.querySelector('.nav-settings-trigger span').innerText = d.settingsBtn;
            document.getElementById('presentStyleTab').querySelector('span').innerText = d.currentStyle;
            document.getElementById('pastStyleTab').querySelector('span').innerText = d.oldStyle;
            
            document.getElementById('settingTitle').innerText = d.settingTitle;
            document.getElementById('lblSettingLang').innerText = d.settingLang;
            document.getElementById('lblSettingEmail').innerText = d.settingEmail;
            document.getElementById('lblSettingPass').innerText = d.settingPass;
            document.getElementById('lblSettingOauth').innerText = d.settingOauth;
            document.getElementById('btnSettingsBack').innerText = d.settingBack;
            document.getElementById('lblProfileDisplay').innerText = d.name;
            document.getElementById('lblProfileHandle').innerText = d.user;
            document.getElementById('profileSaveBtnText').innerText = (lang === 'ar' ? "حفظ والعودة للرئيسية" : "Save & Return Home");

            toggleAuthMode(currentAuthMode);
            modifyActiveTimeline(currentTimelineState);
        }

        function getLiveTimestamp() {
            const now = new Date();
            const dateStr = now.getFullYear() + '/' + String(now.getMonth() + 1).padStart(2, '0') + '/' + String(now.getDate()).padStart(2, '0');
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
            return `${dateStr} | ${timeStr}`;
        }

        function modifyActiveTimeline(target) {
            currentTimelineState = target;
            const pastTab = document.getElementById('pastStyleTab');
            const presentTab = document.getElementById('presentStyleTab');
            const presentView = document.getElementById('presentTimelineView');
            const pastView = document.getElementById('pastTimelineView');
            const publishBtn = document.getElementById('publishBtnText');

            if(target === 'past') {
                document.body.classList.add("mode-past");
                pastTab.className = "time-switching-tab active-tab";
                presentTab.className = "time-switching-tab";
                presentView.className = "timeline-view";
                pastView.className = "timeline-view active-view";
                publishBtn.innerText = dictionary[currentLanguage].btnTopic;
            } else {
                document.body.classList.remove("mode-past");
                pastTab.className = "time-switching-tab";
                presentTab.className = "time-switching-tab active-tab";
                presentView.className = "timeline-view active-view";
                pastView.className = "timeline-view";
                publishBtn.innerText = dictionary[currentLanguage].btnTweet;
            }
        }

        function switchPage(page) {
            document.getElementById('appTimelineMainFeed').style.display = page === 'feed' ? 'flex' : 'none';
            document.getElementById('appTimelineHeader').style.display = page === 'feed' ? 'flex' : 'none';
            document.getElementById('appTopBar').style.display = page === 'feed' ? 'flex' : 'none';
            
            document.getElementById('appProfileSecondPage').style.display = page === 'profile' ? 'block' : 'none';
            document.getElementById('appSettingsPage').style.display = page === 'settings' ? 'block' : 'none';
        }

        function saveAndExitProfile() {
            userAccountData.display = document.getElementById('fieldProfileDisplayName').value.trim();
            let userVal = document.getElementById('fieldProfileHandle').value.trim();
            userAccountData.username = userVal.startsWith('@') ? userVal : '@' + userVal;
            switchPage('feed');
        }

        function createPostCardElement(text, imgUrl, isPastMode) {
            const card = document.createElement('div');
            card.className = 'post-feed-card';
            const uniqueId = 'post_' + Date.now() + Math.floor(Math.random()*1000);
            card.setAttribute('id', uniqueId);

            const userTitle = userAccountData.display;
            const userHandle = userAccountData.username;
            const currentTimestamp = getLiveTimestamp();
            const d = dictionary[currentLanguage];

            let headerHTML = isPastMode ? `
                <div style="text-align: right; width: 100%;">
                    <span class="user-title-text" style="color:#1e3a8a; font-size:15px;">الكاتب/ العضو: ${userTitle}</span>
                    <span class="user-handle-text" style="color:#2563eb; display:inline-block; font-weight:bold;">(معرّف الحساب: ${userHandle})</span>
                    <div class="user-subtitle-stats" style="color:#4b5563; margin-top:4px;">تاريخ كتابة الموضوع ووقت النشر الحالي: ${currentTimestamp}</div>
                </div>
            ` : `
                <div style="text-align: right;">
                    <span class="user-title-text">${userTitle}</span> 
                    <span class="user-handle-text">${userHandle}</span>
                    <div class="user-subtitle-stats">${currentTimestamp}</div>
                </div>
            `;

            let mediaMarkup = imgUrl ? `<img src="${imgUrl}" style="width:100%; border-radius:12px; margin-top:12px; display:block;">` : '';

            card.innerHTML = `
                <div class="card-top-header">${headerHTML}</div>
                <div class="divider-line"></div>
                <div class="post-content">${text}</div>
                ${mediaMarkup}
                <div class="divider-line"></div>
                <div class="actions-footer-container">
                    <button class="like-btn-node" onclick="this.classList.toggle('activated')">
                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span>0</span>
                    </button>
                    <button class="delete-post-btn" onclick="document.getElementById('${uniqueId}').remove()">
                        ${d.deleteText}
                    </button>
                </div>
                <div class="comments-block-area">
                    <div class="comment-box-flex">
                        <input type="text" placeholder="${isPastMode ? d.replyPlaceholderPast : d.replyPlaceholder}">
                        <button class="comment-post-btn" onclick="submitUserReply(this, ${isPastMode})">${isPastMode ? d.replyBtnPast : d.replyBtn}</button>
                    </div>
                </div>
            `;
            return card;
        }

        document.getElementById('dynamicPostForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const area = document.getElementById('mainEditorArea');
            const fileInput = document.getElementById('mediaAttachmentInput');
            let txt = area.value.trim();
            let imgBlobUrl = fileInput.files[0] ? URL.createObjectURL(fileInput.files[0]) : '';

            if(!txt && !imgBlobUrl) return;

            const isPast = (currentTimelineState === 'past');
            const card = createPostCardElement(txt, imgBlobUrl, isPast);
            const view = isPast ? document.getElementById('pastTimelineView') : document.getElementById('presentTimelineView');
            view.insertBefore(card, view.firstChild);

            area.value = '';
            fileInput.value = '';
        });

        function submitUserReply(btn, isPastMode) {
            const input = btn.previousElementSibling;
            let val = input.value.trim();
            if(!val) return;

            const commentNode = document.createElement('div');
            commentNode.className = 'single-comment-node';
            let signature = `${userAccountData.display} (${userAccountData.username})`;
            commentNode.innerHTML = `<strong>${signature}</strong>: ${val} <span style="font-size:9px; color:#9ca3af; float:inline-end;">${getLiveTimestamp()}</span>`;

            btn.closest('.comments-block-area').insertBefore(commentNode, input.closest('.comment-box-flex'));
            input.value = '';
        }

        function injectDefaultPosts() {
            const pView = document.getElementById('presentTimelineView');
            const oView = document.getElementById('pastTimelineView');
            pView.innerHTML = ''; oView.innerHTML = '';
            pView.appendChild(createPostCardElement("أهلاً بك في منصة اينتس / Aintz بشكلها النهائي الكامل والدقيق!", "", false));
            oView.appendChild(createPostCardElement("مرحباً بكم في المنتدى الكلاسيكي التابع لمنصة اينتس، تم توثيق الهويات وحل كافة الإشكاليات.", "", true));
        }
    </script>
</body>
</html>
